name: Continuous integration

on:
  push:
    branches:
      - master
      - release-**
  pull_request:
    branches:
      - '**'
  release:
    types: [published]

jobs:
  # Run unit tests
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        qgis_version: ['3.34', '3.40', '3.44', 'latest']
    env:
      QGIS_TEST_VERSION: ${{ matrix.qgis_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Package PyPI Packages
        run: |
          sudo ./scripts/package_pip_packages.sh
      - name: Test on QGIS
        run: docker compose -f .docker/docker-compose.gh.yml run qgis /usr/src/.docker/run-docker-tests.sh

  zip_comment:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install qtbase5-dev qttools5-dev-tools
          sudo pip install qgis-plugin-ci
      - name: Package PyPI Packages
        run: |
          sudo ./scripts/package_pip_packages.sh
      - name: Make dir
        run: |
          cd ${GITHUB_WORKSPACE}
          mkdir QgisModelBaker_${{ github.event.pull_request.head.sha }}
          mv QgisModelBaker QgisModelBaker_${{ github.event.pull_request.head.sha }}/
      - name: Upload as ZIP Artifact
        id: upload-zip
        uses: actions/upload-artifact@v5
        with:
          name: QgisModelBaker_${{ github.event.pull_request.head.sha }}
          path: QgisModelBaker_${{ github.event.pull_request.head.sha }}
      - name: Create comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          message: |
            🧁 Ta-daaa, find a test ZIP of ${{ github.event.pull_request.head.sha }} [here](https://github.com/opengisch/QgisModelBaker/actions/runs/${{github.run_id}}/artifacts/${{ steps.upload-zip.outputs.artifact-id }}).

  release:
    runs-on: ubuntu-22.04
    env:
      QGIS_TOKEN: ${{ secrets.QGIS_ORG_TOKEN_SIGNEDAV }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
      GITHUB_REF: ${{ github.ref }}
    if: ${{ github.event_name == 'release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install qtbase5-dev qttools5-dev-tools
          sudo pip install qgis-plugin-ci
      - name: Package PyPI Packages
        run: |
          sudo ./scripts/package_pip_packages.sh
      - name: Release
        run: |
          qgis-plugin-ci release ${GITHUB_REF##*/} --transifex-token ${TX_TOKEN} --github-token ${GITHUB_TOKEN} --qgis-token ${QGIS_TOKEN} --asset-path QgisModelBaker/libs

  translations:
    runs-on: ubuntu-22.04
    env:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
    if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo pip install qgis-plugin-ci
      - name: 🌍 Push translations
        run: |
          qgis-plugin-ci push-translation ${TX_TOKEN}
